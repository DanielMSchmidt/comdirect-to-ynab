name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Package binary
        run: tar -czf comdirect-ynab-${{ github.ref_name }}-linux-x86_64.tar.gz -C target/release comdirect-ynab

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: comdirect-ynab-${{ github.ref_name }}-linux-x86_64.tar.gz
